<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        img{
            float: left;
            width: 45%;
            height: 99vh;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0px;
        }
        form{
            margin-left: 250px;
        }
        .right{
            float: right;
            width: 45%;
            padding: 40px 80px;
        }
        .a1{
            float: right;
        }
        h1{
            margin-top: 100px;
            text-align: center;
        }
        .a3{
            display: flex;
            flex-direction: column;
            margin: 30px;
        }
        .a4{
            display: flex;
            margin-left: 30px;
            flex-direction: column;
            gap: 10px;
        }
        input, select{
            width: 300px;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
        }
        button{
            margin: 0 0 0 30px;
            padding: 6px;
            width: 30%;
            background-color: black;
            color: white;
            border-radius: 10px;
        }
        button:hover{
            background-color: rgb(61, 61, 61);
        }
    </style>
</head>
<body>
    <img src="1212.jpg">
    <div class="right">
    <div class="a1">Dont have an account? <a href="lastregister.html">Sign up</a></div>
    <h1>Log in for Website</h1>
    <form>      
        <div class="a3"><label>E-mail</label><input type="email" id="email" name="email"></div>
        <div class="a3"><label>Password</label><input type="password" id="password"></div>     
        <button type="button" onclick="loginuser()">Log in</button>
    </form>
    </div>
    <script>
        function loginuser(event){
            event.preventDefault();
        }
        function loginuser() {
            let email = document.getElementById('email').value;
            let password = document.getElementById('password').value;

            let usersaved = JSON.parse(localStorage.getItem('FormUser'));

            if(!usersaved) {
                alert('Пользователь не найден !')
                return;
            }
            if(email === usersaved.email && password === usersaved.password) {
                window.location.href = 'indexuser.html'
            } else {
                alert('Неверные данные')
            }
        }
    </script>
</body>
</html>
